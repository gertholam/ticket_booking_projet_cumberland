{% extends 'base.html' %}

{% block title %}EventFlow — Connexion{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block layout %}
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon"></div>
      <h1>EventFlow</h1>
      <p>Gérez et réservez vos événements</p>
    </div>

    <div class="tab-switcher">
      <button class="active" onclick="show('login', this)">Connexion</button>
      <button onclick="show('register', this)">Inscription</button>
    </div>

    <div id="login" class="panel active">
      {% if error %}<div class="auth-error">⚠️ {{ error }}</div>{% endif %}
      <form action="/login" method="POST">
        <div class="form-group">
          <label>Nom d'utilisateur</label>
          <input type="text" name="username" placeholder="ex: jean.dupont" required>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">Se connecter →</button>
      </form>
    </div>

    <div id="register" class="panel">
      <form action="/register" method="POST">
        <div class="form-group">
          <label>Nom d'utilisateur</label>
          <input type="text" name="username" placeholder="ex: jean.dupont" required>
        </div>
        <div class="form-group">
          <label>Adresse e-mail</label>
          <input type="email" name="email" placeholder="jean@exemple.com" required>
        </div>
        <div class="form-group">
          <label>Mot de passe</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-submit">Créer mon compte →</button>
      </form>
    </div>
  </div>

  <script>
    function show(id, btn) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-switcher button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }
  </script>
{% endblock %}
