<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes réservations</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .sidebar {
            width: 220px;
            background: #1f2937;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background: #374151;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .status {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
        }

        .pending {
            background: #fef3c7;
        }

        .confirmed {
            background: #dcfce7;
        }

        .cancelled {
            background: #fee2e2;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            background: #dc2626;
            color: white;
        }

        button:hover {
            background: #b91c1c;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Dashboard</h2>

        <a href="/events">📅 Événements</a>
        <a href="/my-reservations">🎟️ Mes réservations</a>
        <a href="/logout">🚪 Déconnexion</a>
    </div>

    <div class="content">

        <h1>Mes réservations</h1>

        {% for booking in bookings %}
        <div class="card">
            <div class="header">
                <div>
                    <h3>{{ booking.event.event_name }}</h3>
                    <p>{{ booking.event.event_date }}</p>
                </div>

                <span class="status {{ booking.status }}">
                    {{ booking.status }}
                </span>
            </div>

            <br>

            <form action="/reservations/cancel/{{ booking.id }}" method="POST">
                <button type="submit">
                    Annuler
                </button>
            </form>
        </div>
        {% endfor %}

    </div>

</body>

</html>
